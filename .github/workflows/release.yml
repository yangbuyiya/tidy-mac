name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS Apple Silicon
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install dependencies
        run: npm ci

      - name: Build signed updater artifacts
        run: npm run release:mac:ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file docs/release-notes.md \
              --latest
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file docs/release-notes.md \
              --latest
          fi

          shopt -s nullglob
          release_dir="src-tauri/target/release/bundle"
          version="${TAG_NAME#v}"
          dmg_asset="$release_dir/dmg/tidy-mac_${version}_aarch64.dmg"
          if [ ! -f "$dmg_asset" ]; then
            dmg_source=("$release_dir"/dmg/*.dmg)
            cp "${dmg_source[0]}" "$dmg_asset"
          fi

          for stale_asset in "app.tar.gz" "app.tar.gz.sig" "_${version}_aarch64.dmg" "tidy-mac-aarch64.app.tar.gz" "tidy-mac-aarch64.app.tar.gz.sig"; do
            gh release delete-asset "$TAG_NAME" "$stale_asset" -y >/dev/null 2>&1 || true
          done

          gh release upload "$TAG_NAME" \
            "$dmg_asset" \
            "$release_dir/macos/tidy-mac_${version}_aarch64.app.tar.gz" \
            "$release_dir/macos/tidy-mac_${version}_aarch64.app.tar.gz.sig" \
            "$release_dir/latest.json" \
            --clobber
