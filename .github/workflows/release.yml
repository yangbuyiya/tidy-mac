name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS Apple Silicon
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install dependencies
        run: npm ci

      - name: Build signed updater artifacts
        run: npm run release:mac:ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "清洁王 $TAG_NAME"

          shopt -s nullglob
          dmg_assets=(src-tauri/target/release/bundle/dmg/*.dmg)

          gh release upload "$TAG_NAME" \
            "${dmg_assets[@]}" \
            "src-tauri/target/release/bundle/macos/清洁王.app.tar.gz" \
            "src-tauri/target/release/bundle/macos/清洁王.app.tar.gz.sig" \
            "src-tauri/target/release/bundle/latest.json" \
            --clobber
